openapi: 3.1.0
info:
  title: Polar API
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /healthz:
    get:
      security: []
      responses:
        '200':
          description: ok
  /v1/capabilities:
    get:
      responses:
        '200':
          description: Capabilities
  /v1/station/health:
    get:
      responses:
        '200':
          description: Health
  /v1/readings/latest:
    get:
      responses:
        '200':
          description: Latest readings
  /v1/readings:
    get:
      parameters:
        - in: query
          name: metric
          required: true
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: resolution
          schema:
            type: string
          description: Optional Go duration for downsampling (for example 5m, 1h)
      responses:
        '200':
          description: Historical readings
  /v1/forecast/latest:
    get:
      responses:
        '200':
          description: Latest forecast
  /v1/diagnostics/data-gaps:
    get:
      responses:
        '200':
          description: Data gaps
  /v1/audit/events:
    get:
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: type
          schema:
            type: string
      responses:
        '200':
          description: Audit events
